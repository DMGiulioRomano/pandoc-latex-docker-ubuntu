services:
  sut:
    image: ubuntu:22.04
    command: "true"
    depends_on:
      sut-minimal:
        condition: service_completed_successfully
      sut-basic:
        condition: service_completed_successfully
      sut-small:
        condition: service_completed_successfully
      sut-medium:
        condition: service_completed_successfully
      sut-full:
        condition: service_completed_successfully

  sut-minimal:
    image: ${IMAGE_ID}:${VERSION}-minimal
    command: |
      sh -c '
      set -e
      pandoc --version
      pandoc-crossref --version
      echo Tests passed!
      '

  sut-basic:
    image: ${IMAGE_ID}:${VERSION}-basic
    command: |
      sh -c '
      set -e
      pandoc --version
      pandoc-crossref --version
      echo Tests passed!
      '

  sut-small:
    image: ${IMAGE_ID}:${VERSION}-small
    command: |
      sh -c '
      set -e
      pandoc --version
      pandoc-crossref --version
      echo Tests passed!
      '

  sut-medium:
    image: ${IMAGE_ID}:${VERSION}-medium
    command: |
      sh -c '
      set -e
      pandoc --version
      pandoc-crossref --version
      echo Tests passed!
      '

  sut-full:
    image: ${IMAGE_ID}:${VERSION}-full
    command: |
      bash -c '
      set -e
      pandoc --version
      pandoc-crossref --version

      cd /tmp

      cat > main.md << EOF
      ---
      title: Test Document
      ---

      # Introduction {#sec:intro}

      See @sec:methods for details.

      # Methods {#sec:methods}

      See @sec:intro for context.

      Test equation:

      $$x^2 + y^2 = z^2$$ {#eq:pythagoras}

      See @eq:pythagoras.
      EOF

      pandoc main.md \
        --filter pandoc-crossref \
        --pdf-engine=xelatex \
        -o main.pdf

      ls main.pdf
      echo Tests passed!
      '
